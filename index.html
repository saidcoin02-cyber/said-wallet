<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Said Wallet - پیشرفته</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #2f2f4f;
      padding: 25px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    button, select, input {
      padding: 10px 20px;
      margin: 8px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4834d4;
    }

    input {
      width: 70%;
    }

    .info {
      margin-top: 15px;
      word-break: break-all;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>💼 Said Wallet - پیشرفته</h1>

<div class="card">

  <h3>Wallet Dashboard</h3>

  <!-- انتخاب شبکه -->
  <select id="network">
    <option value="1">Ethereum</option>
    <option value="56">BSC</option>
    <option value="137">Polygon</option>
  </select>

  <!-- ساخت والت -->
  <button onclick="createWallet()">ساخت والت</button>
  <div class="info" id="address"></div>
  <div class="info" id="balance"></div>

  <!-- ارسال -->
  <h4>ارسال کوین</h4>
  <input type="text" id="toAddress" placeholder="آدرس مقصد">
  <input type="text" id="amount" placeholder="مقدار (ETH/BNB/MATIC)">
  <button onclick="sendCoin()">ارسال</button>
  <div class="info" id="txStatus"></div>
</div>

<script>
  // RPCها برای شبکه‌ها
  const RPCS = {
    1: ["https://eth.llamarpc.com","https://rpc.ankr.com/eth"],
    56: ["https://bsc-dataseed.binance.org","https://rpc.ankr.com/bsc"],
    137: ["https://polygon-rpc.com","https://rpc.ankr.com/polygon"]
  };

  let wallet = null;

  // گرفتن یک RPC سالم
  async function getProvider(chainId) {
    const rpcs = RPCS[chainId];
    for (let rpc of rpcs) {
      try {
        const provider = new ethers.JsonRpcProvider(rpc);
        await provider.getBlockNumber();
        return provider;
      } catch(e) {}
    }
    throw new Error("No working RPC found");
  }

  // ساخت والت
  async function createWallet() {
    wallet = ethers.Wallet.createRandom();
    document.getElementById("address").innerText = "📍 Address: " + wallet.address;

    // گرفتن موجودی اولیه
    const chainId = document.getElementById("network").value;
    const provider = await getProvider(chainId);
    const bal = await provider.getBalance(wallet.address);
    document.getElementById("balance").innerText = "💰 Balance: " + ethers.formatEther(bal);
    document.getElementById("txStatus").innerText = "";
  }

  // ارسال کوین
  async function sendCoin() {
    if (!wallet) return alert("ابتدا والت بسازید!");
    const chainId = document.getElementById("network").value;
    const provider = await getProvider(chainId);
    const w = wallet.connect(provider);

    const to = document.getElementById("toAddress").value;
    const amount = document.getElementById("amount").value;

    try {
      const tx = await w.sendTransaction({
        to,
        value: ethers.parseEther(amount)
      });
      document.getElementById("txStatus").innerText = "✅ Transaction Hash: " + tx.hash;
    } catch (e) {
      document.getElementById("txStatus").innerText = "❌ Error: " + e.message;
    }
  }
</script>

</body>
</html>
